name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Validate release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "valid=true" >> "${GITHUB_OUTPUT}"
            echo "version=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          else
            echo "valid=false" >> "${GITHUB_OUTPUT}"
            echo "Tag '${GITHUB_REF_NAME}' is not a canonical v0.0.0 release tag; skipping release."
          fi

      - name: Check out repository
        if: steps.tag.outputs.valid == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.tag.outputs.valid == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: EDMC-MarketScout/web-src/package-lock.json

      - name: Build Web UI
        if: steps.tag.outputs.valid == 'true'
        working-directory: EDMC-MarketScout/web-src
        run: |
          npm ci
          npm run build

      - name: Check Python syntax
        if: steps.tag.outputs.valid == 'true'
        run: |
          python3 -m py_compile \
            EDMC-MarketScout/load.py \
            EDMC-MarketScout/marketscout_web.py \
            EDMC-MarketScout/marketscout_ledger.py \
            EDMC-MarketScout/marketscout_importer.py

      - name: Package plugin
        if: steps.tag.outputs.valid == 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.tag.outputs.version }}"
          PACKAGE_NAME="EDMC-MarketScout-${VERSION}"
          STAGING_DIR="dist/${PACKAGE_NAME}"
          ZIP_PATH="dist/${PACKAGE_NAME}.zip"

          mkdir -p "${STAGING_DIR}"
          rsync -a --delete --exclude-from="tools/exclusions-release.txt" EDMC-MarketScout/ "${STAGING_DIR}/EDMC-MarketScout/"

          cd "dist/${PACKAGE_NAME}"
          zip -r "../${PACKAGE_NAME}.zip" EDMC-MarketScout
          cd ../..

          echo "zip_path=${ZIP_PATH}" >> "${GITHUB_ENV}"

      - name: Create GitHub Release
        if: steps.tag.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.version }}" \
            "${zip_path}" \
            --title "EDMC-MarketScout ${{ steps.tag.outputs.version }}" \
            --notes "Release ${{ steps.tag.outputs.version }}"
